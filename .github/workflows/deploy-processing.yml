name: Deploy Processing Function App

on:
  push:
    branches: [main]
    paths:
      - "processing/**"
      - "infra/azure/**"
      - "pyproject.toml"
      - ".github/workflows/deploy-processing.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AZURE_FUNCTIONAPP_NAME: eliza-ai-workbench-processing-func-18878
  AZURE_FUNCTIONAPP_PACKAGE_PATH: processing
  AZURE_RESOURCE_GROUP: eliza-ai-workbench-rg

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Function dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install \
            --target "$AZURE_FUNCTIONAPP_PACKAGE_PATH/.python_packages/lib/site-packages" \
            -r "$AZURE_FUNCTIONAPP_PACKAGE_PATH/requirements.txt"

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Package Function App
        shell: bash
        run: |
          set -euo pipefail
          cd "$AZURE_FUNCTIONAPP_PACKAGE_PATH"
          zip -r ../processing-function.zip . \
            -x "local.settings.json" \
            -x "**/__pycache__/**"

      - name: Deploy Function App
        shell: bash
        run: |
          set -euo pipefail
          az functionapp config appsettings set \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_FUNCTIONAPP_NAME" \
            --settings SCM_DO_BUILD_DURING_DEPLOYMENT=false ENABLE_ORYX_BUILD=false
          az functionapp deployment source config-zip \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_FUNCTIONAPP_NAME" \
            --src processing-function.zip \
            --timeout 600
