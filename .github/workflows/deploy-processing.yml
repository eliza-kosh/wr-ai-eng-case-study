name: Deploy Processing Function App

on:
  push:
    branches: [main]
    paths:
      - "processing/**"
      - "infra/azure/**"
      - "pyproject.toml"
      - ".github/workflows/deploy-processing.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  AZURE_FUNCTIONAPP_NAME: eliza-ai-workbench-processing-func-18878
  AZURE_FUNCTIONAPP_PACKAGE_PATH: processing

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Function dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install \
            --target "$AZURE_FUNCTIONAPP_PACKAGE_PATH/.python_packages/lib/site-packages" \
            -r "$AZURE_FUNCTIONAPP_PACKAGE_PATH/requirements.txt"

      - name: Deploy Function App
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          publish-profile: ${{ secrets.AZURE_PROCESSING_FUNCTIONAPP_PUBLISH_PROFILE }}
          scm-do-build-during-deployment: false
          enable-oryx-build: false
          remote-build: false
