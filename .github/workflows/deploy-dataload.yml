name: Deploy Dataload Function App

on:
  push:
    branches: [main]
    paths:
      - "dataload/**"
      - "infra/azure/**"
      - "pyproject.toml"
      - ".github/workflows/deploy-dataload.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  AZURE_FUNCTIONAPP_NAME: eliza-ai-workbench-dataload-func-58415
  AZURE_FUNCTIONAPP_PACKAGE_PATH: dataload

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy Function App
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          scm-do-build-during-deployment: true
          enable-oryx-build: true
